name: Deploy VERA

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SERVER_PORT }} \
              -o StrictHostKeyChecking=no \
              root@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            set -e
            cd /var/www/vera-agents
            git pull origin master
            docker compose build agents
            docker compose up -d agents
            echo "--- last 20 log lines ---"
            docker compose logs --tail=20 agents
          ENDSSH
