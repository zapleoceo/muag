name: Deploy VERA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SERVER_PORT }} \
              -o StrictHostKeyChecking=no \
              root@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            set -e
            cd /var/www/vera-agents

            echo "=== git pull ==="
            git fetch origin master
            git reset --hard origin/master

            echo "=== build ==="
            docker compose build agents

            echo "=== restart ==="
            docker compose stop agents  || true
            docker compose rm -f agents || true
            docker compose up -d agents

            echo "=== waiting for startup (15s) ==="
            sleep 15

            STATUS=$(docker compose ps agents --format "{{.Status}}")
            echo "Container status: $STATUS"

            if echo "$STATUS" | grep -qiE "restarting|exited|unhealthy"; then
              echo "ERROR: container failed to start"
              docker compose logs agents --tail=60 --no-log-prefix
              exit 1
            fi

            echo "=== OK — tail logs ==="
            docker compose logs agents --tail=20 --no-log-prefix
          ENDSSH
